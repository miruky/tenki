<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="気象庁の公開JSONをブラウザから直接読む天気ダッシュボード。今日明日の詳細と週間予報・気温推移を1画面に表示する"
    />
    <title>tenki - 天気ダッシュボード</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // 描画前に保存済みテーマを反映し、リロード時の明暗のちらつきを防ぐ。
      (function () {
        try {
          var t = localStorage.getItem('tenki-theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {
          /* localStorageを触れない環境では既定(端末設定)のままにする */
        }
      })();
    </script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-shell">
        <a class="brand" href="./" aria-label="tenki トップ">
          <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
            <circle cx="11" cy="11" r="5.5" fill="none" stroke="currentColor" stroke-width="2.4" />
            <path
              d="M11 16.5a6 6 0 0 0-.6 12h12.1a5 5 0 0 0 .8-9.9 7 7 0 0 0-12.3-2.1Z"
              fill="none"
              stroke="currentColor"
              stroke-width="2.4"
              stroke-linejoin="round"
            />
          </svg>
          <span>
            <strong>tenki</strong>
            <small>JMA forecast observatory</small>
          </span>
        </a>
        <div class="header-actions">
          <span id="toolbar-status" class="toolbar-status" role="status" aria-live="polite"></span>
          <button
            id="pin-button"
            class="icon-button"
            type="button"
            aria-pressed="false"
            aria-label="この地域をお気に入りに追加する"
            title="お気に入りに追加"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                class="pin-star"
                d="M12 3.6l2.55 5.17 5.7.83-4.13 4.02.98 5.68L12 16.62l-5.1 2.68.98-5.68L3.75 9.6l5.7-.83Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            id="share-button"
            class="icon-button"
            type="button"
            aria-label="表示中の地域を共有する"
            title="表示中の地域を共有"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M8.5 12.8 15.8 8m-7.3 3.2 7.3 4.8M6.5 14.8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Zm10.8-5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Zm0 9.4a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            id="theme-toggle"
            class="icon-button"
            type="button"
            aria-label="配色テーマを切り替える"
            title="配色テーマを切り替える"
          >
            <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle
                cx="12"
                cy="12"
                r="4.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              />
              <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path
                  d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5 5l1.7 1.7M17.3 17.3 19 19M19 5l-1.7 1.7M6.7 17.3 5 19"
                />
              </g>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <section class="forecast-toolbar" aria-label="予報地域">
      <div class="toolbar-shell">
        <div class="toolbar-heading">
          <span>Forecast area</span>
          <strong>予報エリア</strong>
        </div>
        <div class="area-controls">
          <label for="office-select">都道府県・予報区</label>
          <select id="office-select"></select>
        </div>
        <div class="area-controls">
          <label for="area-select">細分区域</label>
          <select id="area-select"></select>
        </div>
        <button
          id="reload-button"
          class="reload-button"
          type="button"
          aria-label="最新の予報を取得する"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M19.5 12a7.5 7.5 0 1 1-2.2-5.3M19.5 3.5v3.7h-3.7"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>更新</span>
        </button>
      </div>
    </section>

    <nav id="favorites-bar" class="favorites-bar" aria-label="お気に入りの地域" hidden></nav>

    <main id="dashboard" class="app-main" aria-live="polite">
      <p class="status">読み込み中...</p>
    </main>

    <footer class="app-footer">
      <p>
        出典: <a href="https://www.jma.go.jp/" rel="noopener">気象庁ホームページ</a>
        の公開データ(forecast / overview_forecast)をブラウザから直接取得しています。
        表示は発表時点の予報で、防災利用は気象庁の発表を直接確認してください。
      </p>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
