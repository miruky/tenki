<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="気象庁の公開JSONをブラウザから直接読む天気ダッシュボード。今日明日の詳細と週間予報・気温推移を1画面に表示する"
    />
    <title>tenki - 天気ダッシュボード</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="11" cy="11" r="5.5" fill="none" stroke="#d99e2b" stroke-width="2.4" />
          <path
            d="M11 16.5a6 6 0 0 0-.6 12h12.1a5 5 0 0 0 .8-9.9 7 7 0 0 0-12.3-2.1Z"
            fill="none"
            stroke="currentColor"
            stroke-width="2.4"
            stroke-linejoin="round"
          />
        </svg>
        <h1>tenki</h1>
        <p class="tagline">気象庁データの天気ダッシュボード</p>
      </div>
      <div class="header-controls">
        <label class="visually-hidden" for="office-select">予報区</label>
        <select id="office-select" aria-label="予報区を選ぶ"></select>
        <label class="visually-hidden" for="area-select">細分区域</label>
        <select id="area-select" aria-label="細分区域を選ぶ"></select>
        <button
          id="reload-button"
          class="icon-button"
          type="button"
          aria-label="最新の予報を取得する"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M19.5 12a7.5 7.5 0 1 1-2.2-5.3M19.5 3.5v3.7h-3.7"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <button
          id="theme-toggle"
          class="icon-button"
          type="button"
          aria-label="配色テーマを切り替える"
        >
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="1.8" />
            <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path
                d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5 5l1.7 1.7M17.3 17.3 19 19M19 5l-1.7 1.7M6.7 17.3 5 19"
              />
            </g>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </header>

    <main id="dashboard" class="app-main" aria-live="polite">
      <p class="status">読み込み中...</p>
    </main>

    <footer class="app-footer">
      <p>
        出典: <a href="https://www.jma.go.jp/" rel="noopener">気象庁ホームページ</a>
        の公開データ(forecast / overview_forecast)をブラウザから直接取得しています。
        表示は発表時点の予報で、防災利用は気象庁の発表を直接確認してください。
      </p>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
